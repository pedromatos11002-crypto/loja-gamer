<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos para Entrega</title>
<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="topo">
  <div class="logo-area">
    <h1>Painel Admin</h1>
  </div>

  <nav>
    <a href="index-admin.html">Todos</a>
    <a href="pedidoemprocessodeentrega.html">Em Processo</a>
    <a href="pedidoparaentrega.html">Entrega</a>
    <a href="pedidofinalizados.html">Finalizados</a>
    <a href="reembolso.html">Reembolso</a>
  </nav>
</header>

<div class="container">
  <h1>Pedidos para Entrega</h1>
  <div id="listaEntrega"></div>
</div>

<script>
function carregarEntrega() {
  let pedidos = JSON.parse(localStorage.getItem("todosPedidos")) || [];
  let lista = document.getElementById("listaEntrega");

  lista.innerHTML = "";

  let filtrados = pedidos
    .map((pedido, indexReal) => ({ pedido, indexReal }))
    .filter(item => item.pedido.status === "Pedido para entrega");

  if (filtrados.length === 0) {
    lista.innerHTML = "<p>Nenhum pedido para entrega.</p>";
    return;
  }

  filtrados.forEach(item => {
    const p = item.pedido;
    const indexReal = item.indexReal;

    lista.innerHTML += `
      <div class="pedido-card">
        <h3>${p.cliente}</h3>
        <p><strong>Email:</strong> ${p.email}</p>
        <p><strong>Telefone:</strong> ${p.telefone}</p>
        <p><strong>Endereço:</strong> ${p.endereco}</p>
        <p><strong>Status:</strong> ${p.status}</p>

        <input type="text" id="cidade${indexReal}" placeholder="Cidade">
        <input type="text" id="estado${indexReal}" placeholder="Estado">
        <input type="text" id="local${indexReal}" placeholder="Local atual do pedido">

        <button onclick="salvarRastreamento(${indexReal})">
          Salvar localização
        </button>

        <button onclick="marcarEntregue(${indexReal})">
          Entregue
        </button>
      </div>
    `;
  });
}

function salvarRastreamento(indexReal) {
  let pedidos = JSON.parse(localStorage.getItem("todosPedidos")) || [];

  pedidos[indexReal].rastreamento = {
    cidade: document.getElementById("cidade" + indexReal).value,
    estado: document.getElementById("estado" + indexReal).value,
    local: document.getElementById("local" + indexReal).value
  };

  localStorage.setItem("todosPedidos", JSON.stringify(pedidos));

  alert("Localização salva!");
}

function marcarEntregue(indexReal) {
  let pedidos = JSON.parse(localStorage.getItem("todosPedidos")) || [];

  pedidos[indexReal].status = "Pedido finalizado";

  localStorage.setItem("todosPedidos", JSON.stringify(pedidos));

  alert("Pedido entregue!");
  carregarEntrega();
}

document.addEventListener("DOMContentLoaded", carregarEntrega);
</script>

</body>
</html>
