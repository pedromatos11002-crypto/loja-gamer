<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Em Processo - Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topo">
  <div class="logo-area">
    <h1>Painel Admin</h1>
  </div>

  <nav>
    <a href="index-admin.html">Todos</a>
    <a href="pedidoemprocessodeentrega.html">Em Processo</a>
    <a href="pedidoparaentrega.html">Entrega</a>
    <a href="pedidofinalizados.html">Finalizados</a>
    <a href="reembolso.html">Reembolso</a>
  </nav>
</header>

<div class="container">
  <h1>Pedidos em Processo</h1>
  <div id="listaProcesso"></div>
</div>

<script>
function carregarProcesso() {
  let pedidos = JSON.parse(localStorage.getItem("todosPedidos")) || [];
  let lista = document.getElementById("listaProcesso");

  lista.innerHTML = "";

  let filtrados = pedidos
    .map((pedido, indexReal) => ({ pedido, indexReal }))
    .filter(item => item.pedido.status === "Em processo");

  if (filtrados.length === 0) {
    lista.innerHTML = "<p>Nenhum pedido em processo.</p>";
    return;
  }

  filtrados.forEach(item => {
    const p = item.pedido;
    const indexReal = item.indexReal;

    lista.innerHTML += `
      <div class="pedido-card">
        <h3>${p.cliente}</h3>
        <p><strong>Email:</strong> ${p.email}</p>
        <p><strong>Telefone:</strong> ${p.telefone}</p>
        <p><strong>Endereço:</strong> ${p.endereco}</p>
        <p><strong>Status:</strong> ${p.status}</p>

        <button onclick="enviarParaEntrega(${indexReal})">
          Enviar para entrega
        </button>
      </div>
    `;
  });
}

function enviarParaEntrega(indexReal) {
  let pedidos = JSON.parse(localStorage.getItem("todosPedidos")) || [];

  pedidos[indexReal].status = "Pedido para entrega";

  localStorage.setItem("todosPedidos", JSON.stringify(pedidos));

  alert("Pedido enviado para a aba Entrega!");
  carregarProcesso();
}

document.addEventListener("DOMContentLoaded", carregarProcesso);
</script>

</body>
</html>
